ktor {
  deployment {
    port = 3000
    port = ${?HTTP_PORT}
    watch = [ classes ]
  }

  application {
    modules = [ com.callapp.server.ApplicationKt.module ]
  }
}

callapp {
  environment = "development"
  environment = ${?APP_ENV}

  database {
    path = "./data/callapp.db"
    path = ${?DB_PATH}
    maximumPoolSize = 4
  }

  server {
    id = "00000000-0000-0000-0000-000000000001"
    id = ${?SERVER_ID}
    name = "CallApp Server"
    name = ${?SERVER_NAME}
    username = "@callapp"
    username = ${?SERVER_USERNAME}
    description = "CallApp backend scaffold"
    imageUrl = ${?SERVER_IMAGE_URL}
    description = ${?SERVER_DESCRIPTION}
  }

  security {
    jwtSecret = "change-me-in-production"
    jwtSecret = ${?JWT_SECRET}
    issuer = "callapp-server"
    issuer = ${?JWT_ISSUER}
    audience = "callapp-clients"
    audience = ${?JWT_AUDIENCE}
    guestTokenTtlMinutes = 30
    userTokenTtlDays = 30
  }

  turn {
    host = "localhost"
    host = ${?TURN_HOST}
    port = 3478
    port = ${?TURN_PORT}
    secret = "change-me-in-production"
    secret = ${?TURN_SECRET}
    realm = "callapp"
    realm = ${?TURN_REALM}
    ttlSeconds = 86400
  }

  bootstrap {
    adminInviteLabel = "Initial admin invite"
    adminInviteToken = ${?BOOTSTRAP_ADMIN_TOKEN}
    adminInviteLabel = ${?BOOTSTRAP_ADMIN_TOKEN_LABEL}
    adminInviteMaxUses = 1
    adminInviteMaxUses = ${?BOOTSTRAP_ADMIN_TOKEN_MAX_USES}
  }
}
